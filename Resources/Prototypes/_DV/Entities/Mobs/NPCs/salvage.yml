- type: entity
  name: Syndicate Guard
  parent: MobHumanNPC # Euphoria mob reparent
  id: MobRadioGuard
  description: "Mindwiped and hypno-indoctrinated into perfect loyalty by the Syndicate. They will throw their life away to defend their objective."
  components:
    - type: NpcFactionMember
      factions:
        - Syndicate
    - type: MobThresholds
      thresholds:
        0: Alive
        100: Dead #Tweak for "Acidify on Crit"
  # - type: MindContainer | Euphoria mob reparent
  #  - type: MindExaminable
    - type: Loadout
      prototypes:
        - RadioGuardGear
    # - type: InputMover | Euphoria mob reparent
    # - type: MobMover
    # - type: HTN
    #   rootTask:
    #     task: SimpleHumanoidHostileCompound
    # - type: Respirator #Mobs can't turn on internals by themselves, so we have to simulate them having it on
    #   damage:
    #     types:
    #       Asphyxiation: 0
    #   damageRecovery:
    #     types:
    #       Asphyxiation: -1.0
    - type: Gun #Mobs currently cannot bolt a gun, so we have to simulate them firing it
      fireRate: 2
      soundGunshot: /Audio/Weapons/Guns/Gunshots/pistol.ogg
      useKey: false
      selectedMode: SemiAuto
      availableModes:
        - SemiAuto
    # - type: CombatMode | Euphoria mob reparent
    - type: BasicEntityAmmoProvider
      proto: CartridgePistol
      capacity: 10
      count: 10
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: 1
      rechargeSound:
        path: /Audio/Weapons/Guns/MagIn/bullet_insert.ogg
    - type: AutoImplant
      implants:
      - DeathAcidifierImplant
    - type: Sprite
      layers:
      - map: [ "enum.HumanoidVisualLayers.TailBehind" ] # Floofstation
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
      - map: [ "enum.HumanoidVisualLayers.Head" ]
      - map: [ "enum.HumanoidVisualLayers.Snout" ]
      - map: [ "enum.HumanoidVisualLayers.Eyes" ]
      - map: [ "enum.HumanoidVisualLayers.RArm" ]
      - map: [ "enum.HumanoidVisualLayers.LArm" ]
      - map: [ "enum.HumanoidVisualLayers.RLeg" ]
      - map: [ "enum.HumanoidVisualLayers.LLeg" ]
      - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
      - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
      - map: ["enum.HumanoidVisualLayers.LFoot"]
      - map: ["enum.HumanoidVisualLayers.RFoot"]
      - map: [ "undergarmentSocks" ] # Floof
      - map: [ "undergarmentTop" ] # Floof - this one is for clothing-based undergarment
      - map: [ "undergarmentBottom" ] # Floof - this one is for clothing-based undergarment
      - map: [ "shoes" ] # Floof - moved above jumpsuit
      - map: [ "jumpsuit" ] # Floof - moved below hands and feet
      - map: ["enum.HumanoidVisualLayers.LHand"] # Floof - moved to keep above jumpsuit (feet and intentionally kept below it)
      - map: ["enum.HumanoidVisualLayers.RHand"] # ^
      - map: [ "gloves" ]
      - map: [ "ears" ]
      - map: [ "eyes" ]
      - map: [ "belt" ]
      - map: [ "id" ]
      - map: [ "outerClothing" ]
      - map: [ "enum.HumanoidVisualLayers.TailOversuit" ] # Floofstation
      - map: [ "back" ]
      - map: [ "neck" ]
      - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
      - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
      - map: [ "enum.HumanoidVisualLayers.Hair" ]
      - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
      - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
      - map: [ "enum.HumanoidVisualLayers.Tail" ]
      - map: [ "mask" ]
