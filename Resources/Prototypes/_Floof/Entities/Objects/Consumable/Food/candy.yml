- type: entity
  parent: FoodLollipop
  id: FoodDelightsLollipop
  name: lollipop
  suffix: No Meds
  description: Can you believe this tasty treat was made in a cigarette factory?
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 11
        reagents: # remove omni and iron so its safe for everyone to eat
        - ReagentId: Sugar
          Quantity: 3
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 3
  - type: Item # tiny so they fit in the pack
    size: Tiny
  - type: Tag # tag so these can be put into the pack
    tags:
    - Cigarette
    - Trash
