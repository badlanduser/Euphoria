# Languages spoken by various critters.
- type: language
  id: Bee
  parent: BaseAnimalLanguage
  chatPrefix: bee # Euphoria/Starlight
  obfuscation:
    !type:SyllableObfuscation
    minSyllables: 1
    maxSyllables: 3
    replacement:
    - bz
    - zz
    - bzt
    - bzz

